<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{ margin:0; width:100%; height:100%; }
  body{ box-sizing:border-box; padding:36px 32px; display:flex; flex-direction:column;
        font-family:system-ui,-apple-system,sans-serif; color:#0f172a;
        background:#fff; border-radius:20px; box-shadow:0 20px 50px rgba(2,6,23,.18); }
  h1{ margin:0; font-size:22px; letter-spacing:1px; color:#6366f1; }
  .price{ font-size:64px; font-weight:800; margin:12px 0 4px; }
  .price small{ font-size:20px; font-weight:500; color:#64748b; }
  ul{ list-style:none; padding:0; margin:20px 0; flex:1; }
  li{ padding:10px 0; border-bottom:1px solid #eef2f7; font-size:18px; color:#334155; }
  li::before{ content:'✓'; color:#22c55e; font-weight:800; margin-right:10px; }
  .cta{ background:linear-gradient(90deg,#6366f1,#8b5cf6); color:#fff; text-align:center;
        padding:16px; border-radius:12px; font-size:18px; font-weight:700; }
</style></head>
<body>
  <h1>PRO</h1>
  <div class="price">$29<small>/mo</small></div>
  <ul>
    <li>Unlimited projects</li>
    <li>4K exports</li>
    <li>Priority support</li>
    <li>Team seats</li>
  </ul>
  <div class="cta">Start free trial</div>
</body></html>
