<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{ margin:0; width:100%; height:100%; }
  body{ display:flex; font-family:system-ui,-apple-system,sans-serif;
        background:#0b1020; color:#e2e8f0; }
  .s{ flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:8px; border-right:1px solid #1e293b; }
  .s:last-child{ border-right:0; }
  .n{ font-size:68px; font-weight:800; line-height:1;
      background:linear-gradient(90deg,#38bdf8,#818cf8);
      -webkit-background-clip:text; background-clip:text; color:transparent; }
  .l{ font-size:18px; letter-spacing:2px; text-transform:uppercase; color:#94a3b8; }
</style></head>
<body>
  <div class="s"><div class="n">1.2M</div><div class="l">Users</div></div>
  <div class="s"><div class="n">98%</div><div class="l">Uptime</div></div>
  <div class="s"><div class="n">4.9★</div><div class="l">Rating</div></div>
</body></html>
