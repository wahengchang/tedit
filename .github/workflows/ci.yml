name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支新 push 取消尚在跑的舊 run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # parity / e2e / compositor 測試靠 playwright 無頭 chromium 算圖
      # ubuntu runner 預載的 azure-cli apt source 偶爾 403,會讓 --with-deps 的
      # apt-get update 整個失敗;先移掉該 source 再裝,不影響 chromium 系統依賴
      - name: Install Playwright chromium
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          npx playwright install --with-deps chromium

      # npm test 內含 build → unit → parity → cli → editor → e2e → compositor
      - name: Test
        run: npm test
